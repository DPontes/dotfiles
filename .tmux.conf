# Set default shell to fish
set -g default-shell /usr/bin/fish

# Set the prefix to 'Ctrl-s' instead of 'Ctrl-b'
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# Set C-r to reload source file
unbind r
bind r source-file $HOME/.tmux.conf

# Bind v and h to split window vertically and horizontally
bind-key v split-window -v
bind-key h split-window -h

# Bind hjkl for pane change
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Bind prefix+h/l to move to right/left window
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# Bind prefix and "33" to resize the current window to 33% of the total size
bind-key 2 resize-pane -x 25%
bind-key 3 resize-pane -x 33%
bind-key 5 resize-pane -x 50%
bind-key 6 resize-pane -x 66%
bind-key 7 resize-pane -x 75%

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'

# opencode.ai color scheme — edit themes/opencode.sh and run make theme
source-file $HOME/dotfiles/themes/generated/tmux-colors.conf

# Configure Online
set -g @online_icon "ok"
set -g @offline_icon "nok"
set -g @city "Gothenburg"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# status right look and feel
set -g status-right-length 150
set -g status-right ""
set -ga status-right "#[fg=#{@thm_music}] #(playerctl metadata --format '{{ artist }} - {{ title }}' 2>/dev/null | cut -c 1-50 || echo '')"
set -ga status-right "#[fg=#{@thm_separator}]|"
set -ga status-right "#[fg=#{@thm_weather}] #($HOME/dotfiles/tmux/tmux-weather.sh #{@city}) "
set -ga status-right "#[fg=#{@thm_separator}]|"
set -ga status-right "#[fg=#{@thm_bluetooth}] #($HOME/dotfiles/tmux/tmux-bluetooth.sh) "
set -ga status-right "#[fg=#{@thm_separator}]|"
set -ga status-right "#[fg=#{@thm_weather}] #($HOME/dotfiles/tmux/tmux-check-connection.sh) "
set -ga status-right "#[fg=#{@thm_separator}]|"
set -ga status-right "#[fg=#{@thm_vpn}] #($HOME/dotfiles/tmux/tmux-vpn.sh) "
set -ga status-right "#[fg=#{@thm_separator}]|"
set -ga status-right "#[fg=#{@thm_time}] %Y-%m-%d %H:%M "
set -ga status-right "#[fg=#{@thm_separator}]|"
set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[fg=#{@thm_battery_low}]},#{#[fg=#{@thm_battery_ok}]}} #{battery_icon} #{battery_percentage} "

# bootstrap tpm
if "test ! -d $HOME/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $HOME/.tmux/plugins/tpm && $HOME/.tmux/plugins/tpm/bin/install_plugins'"

# Configure Tmux
set -g status-position top
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_blue}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_blue}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

# Set automatic Session Restore
set -g @continuum-restore 'on'

# Initialize TPM (keep this line at the very bottom of the file
run '$HOME/.tmux/plugins/tpm/tpm'
