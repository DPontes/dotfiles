# Shell & tmux — fish auto-starts tmux via config.fish
shell /usr/bin/fish

# Font
font_family JetBrains Mono
font_size 9.0

# opencode.ai color scheme
foreground #e0e0e0
background #212121

# Cursor
cursor #fab283
cursor_text_color #212121

# Selection
selection_foreground #212121
selection_background #fab283

# URL
url_color #9d7cd8

# Normal colors (0-7)
color0  #212121
color1  #e06c75
color2  #7fd88f
color3  #f5a742
color4  #5c9cf5
color5  #9d7cd8
color6  #56b6c2
color7  #e0e0e0

# Bright colors (8-15)
color8  #6a6a6a
color9  #e06c75
color10 #7fd88f
color11 #f5a742
color12 #5c9cf5
color13 #9d7cd8
color14 #56b6c2
color15 #fab283

# Tab bar
active_tab_foreground   #212121
active_tab_background   #fab283
inactive_tab_foreground #6a6a6a
inactive_tab_background #252525

# Window
background_opacity 1.0
window_padding_width 4
confirm_os_window_close 0
remember_window_size no