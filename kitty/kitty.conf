# Shell & tmux — fish auto-starts tmux via config.fish
shell /usr/bin/fish

# Font
font_family JetBrains Mono
font_size 9.0

# opencode.ai color scheme — edit themes/opencode.sh and run make theme
include ../themes/generated/kitty-colors.conf

# Window
background_opacity 1.0
window_padding_width 4
confirm_os_window_close 0
remember_window_size no