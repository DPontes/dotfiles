# Shell & tmux — fish auto-starts tmux via config.fish
shell /usr/bin/fish

# Font
font_family Monospace
font_size 9.0

# Tokyo Night color scheme
foreground #c0caf5
background #1a1b26

# Cursor
cursor #c0caf5
cursor_text_color #1a1b26

# Selection
selection_foreground #c0caf5
selection_background #33467c

# URL
url_color #73daca

# Normal colors
color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6

# Bright colors
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# Tab bar
active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
inactive_tab_foreground #a9b1d6
inactive_tab_background #1a1b26

# Window
background_opacity 0.80
window_padding_width 4
confirm_os_window_close 0
remember_window_size no
