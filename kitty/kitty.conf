# Shell & tmux — fish auto-starts tmux via config.fish
shell /usr/bin/fish

# Font
font_family JetBrains Mono
font_size 9.0

# opencode.ai color scheme
foreground #F1ECEC
background #211E1E

# Cursor
cursor #F1ECEC
cursor_text_color #211E1E

# Selection
selection_foreground #F1ECEC
selection_background #4B4646

# URL
url_color #B7B1B1

# Normal colors
color0  #1C1918
color1  #8B4040
color2  #4E6E4A
color3  #7A6040
color4  #4A5C7A
color5  #6A4E7A
color6  #3D6E6E
color7  #B7B1B1

# Bright colors
color8  #4B4646
color9  #B05C5C
color10 #6E9468
color11 #A08050
color12 #6A82A8
color13 #8E6EA8
color14 #5A9494
color15 #F1ECEC

# Tab bar
active_tab_foreground   #211E1E
active_tab_background   #B7B1B1
inactive_tab_foreground #B7B1B1
inactive_tab_background #2E2928

# Window
background_opacity 1.0
window_padding_width 4
confirm_os_window_close 0
remember_window_size no
